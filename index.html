<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de contatos</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header class="container pt-5"><h1>Contato</h1></header>
    <section class="container">
      <div>
        <p class="mt-3">Nome</p>
        <input
          type="text"
          name="Name"
          id="fullName"
          class="form-control"
          placeholder="Nome completo"
        />
      </div>
      <div class="mt-3">
        <p class="mt-3">CPF</p>
        <input
          type="text"
          name="Name"
          id="fullName"
          class="form-control"
          placeholder="000.000.000-00"
        />
      </div>
      <div>
        <p class="mt-3">Celular</p>
        <input
          type="text"
          name="Name"
          id="fullName"
          class="form-control"
          placeholder="(00) 0000-0000"
        />
      </div>
      <!-- >Verificar se o numero tem whatsapp
           >adicionar mais numeros de celular, ate um total de 10 
      -->
      <button class="addTel mt-3">Adicionar número</button>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script type="text/javascript" src="main.js"></script>
  </body>
</html>
