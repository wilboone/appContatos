<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de contatos</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
  </head>
  <body
    class="bg-light d-flex align-items-center justify-content-center vh-100"
  >
    <div
      class="card shadow p-4"
      style="max-width: 400px; width: 100%; border-radius: 10px"
    >
      <h2 class="text-center mb-3">Cadastro</h2>

      <form>
        <div class="mb-3">
          <label class="form-label">Nome completo</label>
          <input
            type="text"
            class="form-control"
            placeholder="Digite seu nome completo"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label">CPF</label>
          <input
            type="text"
            id="cpf"
            class="form-control"
            placeholder="000.000.000-00"
            maxlength="14"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Celulares</label>
          <div id="telefones">
            <div id="supRemover" class="mb-3">
              <div class="input-group">
                <input
                  type="text"
                  id="celular"
                  class="form-control celular"
                  placeholder="(00) 00000-0000"
                  maxlength="15"
                  required
                />
                <button type="button" class="btn btn-danger remover">
                  Remover
                </button>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  value=""
                  id="checkDefault"
                />
                <label class="form-check-label" for="checkDefault">
                  Possui WhatsApp
                </label>
              </div>
            </div>
          </div>
          <button
            type="button"
            id="addTelefone"
            class="btn btn-secondary btn-sm mt-2"
          >
            + Adicionar outro número
          </button>
        </div>

        <button type="submit" class="btn btn-primary mt-3">Enviar</button>
      </form>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script type="text/javascript" src="main.js"></script>
  </body>
</html>
